ws_reconnect_initial_ms = 1000
ws_reconnect_max_ms = 30000
ws_unhealthy_after_failures = 5
journal_async_queue_capacity = 4096
auto_trade_enabled = false

[strategy]
entry_window_secs = 86400
post_funding_hold_secs = 0
max_entry_notional = 25.0
live_max_entry_notional = 25.0
