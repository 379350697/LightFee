min_funding_edge_bps = 6.0
min_expected_edge_bps = 1.0
min_worst_case_edge_bps = 0.0
exit_slippage_reserve_bps = 3.0
execution_buffer_bps = 2.0
capital_buffer_bps = 1.0
transfer_healthy_bias_bps = 0.25
transfer_unknown_bias_bps = 0.0
transfer_degraded_bias_bps = -0.5
