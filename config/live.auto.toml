poll_interval_ms = 3000
max_market_age_ms = 4000
max_order_quote_age_ms = 10000
uncertain_order_cooldown_ms = 30000
auto_trade_enabled = true

[strategy]
entry_window_secs = 180
post_funding_hold_secs = 0
max_entry_notional = 1000.0
live_max_entry_notional = 50.0
forced_live_entry_notional_quote = 50.0
live_target_leverage = 4
max_concurrent_positions = 6
